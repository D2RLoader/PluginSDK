# Patching Sample Plugin config
#
# The sample build copies this to:
#   d2rloader/config/patching-sample.toml
#
# D2RLoader's TOML helpers preserve strings, booleans, integers, and floats.
# Plugins can read their own TOML text with PluginContext::ReadConfig.

[patching-sample]

# Boolean value.
apply_memory_patches = true

# Boolean value. Native hooks require D2RL::PluginFlags::NativeHooks in code.
install_native_hook_example = false

# String value.
log_level = "info"

# Integer value.
expected_api_version = 2

# Float value.
example_scale = 1.0
